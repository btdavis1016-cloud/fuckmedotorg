<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hellobendy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #ffffff 0%, #e0f7f7 40%, #7ee8e8 100%);
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }
  .blob1 { width: 480px; height: 480px; background: #a8edea; top: -140px; left: -100px; animation: drift1 9s ease-in-out infinite alternate; }
  .blob2 { width: 360px; height: 360px; background: #fed6e3; bottom: -80px; right: -80px; animation: drift2 11s ease-in-out infinite alternate; }
  .blob3 { width: 280px; height: 280px; background: #96fbc4; bottom: 80px; left: 60px; animation: drift3 7s ease-in-out infinite alternate; }

  @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(40px, 30px) scale(1.1); } }
  @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-30px, -40px) scale(1.08); } }
  @keyframes drift3 { from { transform: translate(0,0) scale(1); } to { transform: translate(20px, -25px) scale(1.05); } }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 640px;
    width: 100%;
  }

  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(0,180,180,0.25);
    color: #0a9a9a;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 2rem;
    backdrop-filter: blur(8px);
  }

  .wordmark {
    font-size: clamp(56px, 12vw, 96px);
    font-weight: 700;
    line-height: 1;
    margin-bottom: 1.5rem;
  }

  .hello {
    color: #0d0d0d;
    display: block;
  }

  .bendy {
    display: block;
    background: linear-gradient(135deg, #FF3CAC 0%, #784BA0 50%, #2B86C5 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    background-size: 200% 200%;
    animation: gradshift 5s ease-in-out infinite alternate;
  }

  @keyframes gradshift {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }

  .tagline {
    font-size: clamp(15px, 2.8vw, 19px);
    font-weight: 400;
    color: rgba(0,0,0,0.45);
    margin-bottom: 3rem;
    line-height: 1.7;
  }

  .tagline span {
    color: rgba(0,0,0,0.75);
    font-weight: 500;
  }

  .divider {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #FF3CAC, #2B86C5);
    border-radius: 2px;
    margin: 0 auto 3rem;
  }

  .contact-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.3);
    margin-bottom: 1rem;
  }

  .contact-email {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(0,160,160,0.2);
    border-radius: 100px;
    padding: 12px 24px;
    color: #0d0d0d;
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
    backdrop-filter: blur(8px);
  }

  .contact-email:hover {
    background: rgba(255,255,255,0.8);
    border-color: rgba(0,160,160,0.4);
  }

  .email-dot {
    width: 8px;
    height: 8px;
    background: #FF3CAC;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .footer {
    position: fixed;
    bottom: 1.5rem;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    color: rgba(0,0,0,0.2);
    z-index: 1;
  }
</style>
</head>
<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="container">
  <div class="badge">Something's coming</div>

  <div class="wordmark">
    <span class="hello">hello,</span>
    <span class="bendy">bendy.</span>
  </div>

  <div class="tagline">
    A creative hub for the like-minded.<br>
    <span>Currently working through the kinks...</span> check back soon!
  </div>

  <div class="divider"></div>

  <p class="contact-label">In the meantime, say hi</p>
  <a class="contact-email" href="mailto:hello@hellobendy.com">
    <span class="email-dot"></span>
    hello@hellobendy.com
  </a>
</div>

<div class="footer">hellobendy.com</div>

</body>
</html>
